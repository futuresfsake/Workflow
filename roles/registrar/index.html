<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCCTEST Portal - Main Terminal</title>
    <style>
        :root {
            --navy-dark: #0f172a;
            --primary-blue: #1e3a8a;
            --accent-blue: #3b82f6;
            --bg-light: #f8fafc;
            --border-muted: #e2e8f0;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        
        body { 
            background-color: var(--bg-light); 
            display: flex; 
            min-height: 100vh;
            overflow: hidden;
        }

        /* Universal Sidebar Shell Layout */
        .sidebar { 
            width: 320px; 
            background-color: var(--navy-dark); 
            color: white; 
            padding: 30px 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            border-right: 1px solid var(--border-muted); 
            position: fixed; 
            top: 0;
            left: 0;
            height: 100vh; 
            overflow-y: auto; 
            z-index: 10; 
        }
        
        .sidebar h2 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; border-bottom: 1px solid #334155; padding-bottom: 15px; margin-bottom: 10px; }
        .sidebar p { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .menu-group { margin-bottom: 15px; }
        .menu-group-title { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #64748b; letter-spacing: 0.5px; margin-bottom: 8px; padding-left: 5px; }
        .task-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
        
        .task-link { 
            padding: 10px 12px; 
            font-size: 13px; 
            border-radius: 6px; 
            color: #94a3b8; 
            cursor: pointer; 
            display: block; 
            transition: all 0.2s; 
            border: none; 
            background: none; 
            text-align: left; 
            width: 100%; 
        }
        .task-link:hover { background-color: rgba(255,255,255,0.04); color: #f1f5f9; }
        .task-link.active { background-color: var(--accent-blue); color: white; font-weight: 600; }

        /* The Isolated Workspace Viewport Box */
        .workspace-viewport { 
            flex: 1; 
            margin-left: 320px; 
            height: 100vh;
            width: calc(100vw - 320px);
            border: none;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div>
            <h2>MCCTEST Portal</h2>
            <p>Registrar Workspace</p>
        </div>

        <div class="menu-group">
            <div class="menu-group-title">Admission & Registration</div>
            <ul class="task-list">
                <li><button class="task-link active" onclick="loadWorkflow('admission-verification.html', this)">Admission Verification</button></li>
                <li><button class="task-link" onclick="loadWorkflow('enrollment-process.html', this)">Enrollment Process</button></li>
                <li><button class="task-link" onclick="loadWorkflow('uniform-id-distribution.html', this)">Uniform & ID Distribution</button></li>
            </ul>
        </div>

        <div class="menu-group">
            <div class="menu-group-title">Inventory & Records</div>
            <ul class="task-list">
                <li><button class="task-link" onclick="loadWorkflow('inventory-checklist.html', this)">Inventory / Checklist</button></li>
                <li><button class="task-link" onclick="loadWorkflow('student-information-bar.html', this)">Student Information Bar</button></li>
                <li><button class="task-link" onclick="loadWorkflow('clearance-approval.html', this)">Clearance Approval</button></li>
                <li><button class="task-link" onclick="loadWorkflow('dropout-process.html', this)">Dropout Process</button></li>

            </ul>
        </div>
    </aside>

    <iframe src="workflows/admission-verification.html" id="content-frame" class="workspace-viewport"></iframe>

    <script>
        function loadWorkflow(fileName, element) {
            // Remove active classes from all links
            document.querySelectorAll('.task-link').forEach(btn => btn.classList.remove('active'));
            // Highlight current button selection
            element.classList.add('active');
            
            // Re-route the frame viewport directly into the workflows directory
            document.getElementById('content-frame').src = 'workflows/' + fileName;
        }
    </script>
</body>
</html>
