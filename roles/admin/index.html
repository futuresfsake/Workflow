<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCCTEST TMIS — Administrator Workflow Guide</title>
<style>
  :root{
    --navy-dark:#0f172a;
    --navy-soft:#16213e;
    --primary-blue:#1e3a8a;
    --accent-blue:#3b82f6;
    --accent-blue-dark:#2563eb;
    --bg-light:#f6f8fb;
    --card-white:#ffffff;
    --border-muted:#e2e8f0;
    --text-main:#1e293b;
    --text-soft:#64748b;
    --text-faint:#94a3b8;
    --success:#16a34a;
    --success-bg:#ecfdf3;
    --warning:#d97706;
    --warning-bg:#fffaeb;
    --danger:#dc2626;
    --danger-bg:#fef2f2;
    --info-bg:#eff6ff;
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;}
  body{background:var(--bg-light);color:var(--text-main);min-height:100vh;display:flex;overflow-x:hidden;}

  /* ---------- SIDEBAR ---------- */
  .sidebar{
    width:300px;background:var(--navy-dark);color:#fff;
    display:flex;flex-direction:column;
    position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:20;
    border-right:1px solid #1c2942;
    transition:transform .25s ease;
  }
  .sidebar::-webkit-scrollbar{width:6px;}
  .sidebar::-webkit-scrollbar-thumb{background:#243258;border-radius:4px;}

  .brand{padding:26px 22px 18px;border-bottom:1px solid #1c2942;}
  .brand-mark{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .brand-logo{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--accent-blue),var(--primary-blue));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0;}
  .brand-mark h1{font-size:16px;font-weight:700;letter-spacing:-.2px;line-height:1.2;}
  .brand-mark span{display:block;font-size:10.5px;color:var(--text-faint);font-weight:500;letter-spacing:.3px;margin-top:1px;}
  .brand-tag{font-size:11px;color:#7c8bb0;background:#141d38;border:1px solid #243258;padding:6px 10px;border-radius:6px;display:inline-block;}

  .nav-scroll{padding:16px 14px 30px;flex:1;}
  .menu-group{margin-bottom:6px;}
  .menu-group-title{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#5b6b8f;padding:10px 8px 8px;}
  .menu-group-title svg{opacity:.65;}
  .soon-tag{margin-left:auto;font-size:9px;font-weight:700;letter-spacing:.4px;background:#1c2942;color:#7c8bb0;padding:2px 6px;border-radius:20px;text-transform:none;}

  .task-list{list-style:none;display:flex;flex-direction:column;gap:2px;margin-bottom:10px;}
  .task-link{
    padding:9px 12px 9px 34px;font-size:13px;border-radius:7px;color:#a9b6d3;
    cursor:pointer;display:block;width:100%;text-align:left;border:none;background:none;
    position:relative;transition:background .15s, color .15s;
  }
  .task-link:hover{background:rgba(255,255,255,.05);color:#f1f5f9;}
  .task-link.active{background:var(--accent-blue);color:#fff;font-weight:600;}
  .task-link.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#fff;border-radius:0 3px 3px 0;}
  .task-link.dashboard-link{padding-left:12px;font-weight:600;font-size:13.5px;}
  .task-link.disabled{color:#4b5978;cursor:not-allowed;}
  .task-link.disabled:hover{background:none;color:#4b5978;}

  .dot{position:absolute;left:16px;top:50%;transform:translateY(-50%);width:4px;height:4px;border-radius:50%;background:currentColor;opacity:.7;}

  .sidebar-footer{padding:14px 20px;border-top:1px solid #1c2942;font-size:11px;color:#5b6b8f;}

  /* ---------- MAIN ---------- */
  .main{flex:1;margin-left:300px;min-height:100vh;display:flex;flex-direction:column;width:calc(100% - 300px);}
  .topbar{
    background:var(--card-white);border-bottom:1px solid var(--border-muted);
    padding:14px 34px;display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:5;
  }
  .breadcrumb{font-size:12.5px;color:var(--text-soft);display:flex;align-items:center;gap:6px;}
  .breadcrumb b{color:var(--navy-dark);font-weight:700;}
  .role-pill{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--text-soft);background:var(--bg-light);border:1px solid var(--border-muted);padding:6px 12px;border-radius:20px;}
  .role-pill .avatar{width:22px;height:22px;border-radius:50%;background:var(--primary-blue);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;}

  .content-area{padding:34px 40px 80px;max-width:920px;width:100%;margin:0 auto;}

  /* ---------- TASK HEADER ---------- */
  .task-header{background:var(--card-white);border:1px solid var(--border-muted);border-radius:14px;padding:26px 28px;margin:0 auto 28px;max-width:760px;box-shadow:0 1px 2px rgba(15,23,42,.04);}
  .task-eyebrow{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--accent-blue-dark);margin-bottom:8px;}
  .task-title{font-size:23px;font-weight:800;color:var(--navy-dark);letter-spacing:-.3px;margin-bottom:8px;}
  .task-desc{font-size:14px;color:var(--text-soft);line-height:1.6;margin-bottom:16px;max-width:640px;}
  .meta-row{display:flex;flex-wrap:wrap;gap:8px;}
  .meta-chip{font-size:12px;font-weight:600;padding:6px 12px;border-radius:20px;display:flex;align-items:center;gap:6px;}
  .meta-chip.time{background:var(--info-bg);color:var(--primary-blue);}
  .meta-chip.prereq{background:#f1f5f9;color:var(--text-soft);font-weight:500;}

  /* ---------- STEPS ---------- */
  .steps{position:relative;max-width:760px;margin:0 auto;}
  .step{display:flex;gap:16px;position:relative;padding-bottom:30px;}
  .step:last-child{padding-bottom:0;}
  .step:not(:last-child)::before{content:'';position:absolute;left:15px;top:34px;bottom:-2px;width:2px;background:var(--border-muted);}
  .step-num{width:32px;height:32px;border-radius:50%;background:var(--primary-blue);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;z-index:1;box-shadow:0 0 0 4px var(--bg-light);}
  .step-body{flex:1;padding-top:3px;}
  .step-title{font-weight:700;font-size:15px;color:var(--navy-dark);margin-bottom:5px;}
  .step-desc{font-size:13.5px;color:#475569;line-height:1.6;margin-bottom:14px;}
  .step-desc code{background:#f1f5f9;padding:1px 6px;border-radius:4px;font-size:12px;color:var(--primary-blue);}

  .mockup-box{border:1.5px dashed #cbd5e1;background:#fbfcfe;border-radius:12px;padding:18px 20px;}
  .mockup-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
  .mockup-label::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent-blue);}

  /* ---------- GENERIC UI ELEMENTS (mockups) ---------- */
  .ui-search{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
  .ui-input, .ui-select, .ui-textarea{
    border:1px solid var(--border-muted);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--text-main);background:#fff;outline:none;
  }
  .ui-input:focus, .ui-select:focus, .ui-textarea:focus{border-color:var(--accent-blue);box-shadow:0 0 0 3px rgba(59,130,246,.12);}
  .ui-input{flex:1;min-width:160px;}
  .ui-textarea{width:100%;resize:vertical;min-height:64px;font-family:inherit;}

  .btn{border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;transition:filter .15s, transform .05s;}
  .btn:active{transform:scale(.98);}
  .btn-primary{background:var(--accent-blue);color:#fff;}
  .btn-primary:hover{filter:brightness(1.07);}
  .btn-outline{background:#fff;border:1px solid var(--border-muted);color:var(--text-main);}
  .btn-outline:hover{background:#f8fafc;}
  .btn-success{background:var(--success);color:#fff;}
  .btn-success:hover{filter:brightness(1.07);}
  .btn-danger{background:var(--danger);color:#fff;}
  .btn-danger:hover{filter:brightness(1.07);}
  .btn-sm{padding:6px 12px;font-size:12px;}
  .btn:disabled{opacity:.55;cursor:not-allowed;}

  table.ui-table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;border:1px solid var(--border-muted);}
  table.ui-table th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--text-faint);background:#f8fafc;padding:10px 14px;border-bottom:1px solid var(--border-muted);}
  table.ui-table td{padding:11px 14px;font-size:13px;border-bottom:1px solid #f1f5f9;color:var(--text-main);vertical-align:middle;}
  table.ui-table tr:last-child td{border-bottom:none;}
  table.ui-table tr:hover td{background:#fafcff;}
  .cell-name{font-weight:600;}
  .cell-sub{font-size:11.5px;color:var(--text-faint);}

  .chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:20px;}
  .chip::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;}
  .chip-pending{background:var(--warning-bg);color:var(--warning);}
  .chip-review{background:var(--info-bg);color:var(--accent-blue-dark);}
  .chip-approved{background:var(--success-bg);color:var(--success);}
  .chip-rejected{background:var(--danger-bg);color:var(--danger);}

  .card{background:#fff;border:1px solid var(--border-muted);border-radius:12px;padding:18px 20px;}
  .doc-list{display:flex;flex-direction:column;gap:9px;}
  .doc-item{display:flex;align-items:center;justify-content:between;gap:10px;font-size:13px;padding:9px 12px;border:1px solid var(--border-muted);border-radius:8px;background:#fff;}
  .doc-item .icon-ok{color:var(--success);font-weight:800;}
  .doc-item .icon-bad{color:var(--danger);font-weight:800;}
  .doc-item .doc-name{flex:1;}
  .doc-item .doc-status{font-size:11.5px;font-weight:700;}

  .info-note{display:flex;gap:10px;background:var(--info-bg);border:1px solid #bfdbfe;border-radius:10px;padding:14px 16px;font-size:12.5px;color:var(--primary-blue);line-height:1.55;}
  .info-note b{display:block;font-size:12.5px;margin-bottom:2px;}

  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--border-muted);margin-bottom:16px;}
  .tab-btn{background:none;border:none;padding:9px 14px;font-size:12.5px;font-weight:600;color:var(--text-soft);cursor:pointer;border-bottom:2px solid transparent;}
  .tab-btn.active{color:var(--accent-blue-dark);border-bottom-color:var(--accent-blue);}
  .tab-panel{display:none;}
  .tab-panel.active{display:block;}
  .kv-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 20px;}
  .kv{font-size:12.5px;}
  .kv label{display:block;color:var(--text-faint);font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;}
  .kv div.val{color:var(--text-main);font-weight:600;}

  /* ---------- MODAL ---------- */
  .modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;}
  .modal-overlay.show{display:flex;}
  .modal-card{background:#fff;border-radius:14px;max-width:480px;width:100%;max-height:86vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:pop .16s ease;}
  @keyframes pop{from{transform:scale(.96);opacity:0;}to{transform:scale(1);opacity:1;}}
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border-muted);}
  .modal-head h3{font-size:15.5px;font-weight:700;color:var(--navy-dark);}
  .modal-close{background:none;border:none;font-size:18px;color:var(--text-faint);cursor:pointer;line-height:1;}
  .modal-body{padding:20px 22px;}
  .modal-foot{padding:16px 22px;border-top:1px solid var(--border-muted);display:flex;justify-content:flex-end;gap:10px;}
  .modal-foot.split{justify-content:space-between;}

  /* ---------- TOASTS ---------- */
  .toast-container{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:10px;z-index:200;}
  .toast{min-width:280px;max-width:340px;background:var(--navy-dark);color:#fff;padding:13px 16px;border-radius:10px;font-size:13px;display:flex;align-items:center;gap:10px;box-shadow:0 10px 30px rgba(0,0,0,.25);animation:slidein .2s ease;border-left:4px solid var(--accent-blue);}
  .toast.success{border-left-color:var(--success);}
  .toast.danger{border-left-color:var(--danger);}
  .toast.warning{border-left-color:var(--warning);}
  .toast .t-icon{font-weight:800;}
  @keyframes slidein{from{transform:translateX(30px);opacity:0;}to{transform:translateX(0);opacity:1;}}
  .toast.fade-out{animation:fadeout .25s ease forwards;}
  @keyframes fadeout{to{opacity:0;transform:translateX(20px);}}

  /* ---------- DASHBOARD ---------- */
  .dash-welcome{margin-bottom:24px;}
  .dash-welcome h2{font-size:22px;font-weight:800;color:var(--navy-dark);letter-spacing:-.3px;margin-bottom:6px;}
  .dash-welcome p{font-size:13.5px;color:var(--text-soft);}
  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:26px;}
  .stat-card{background:#fff;border:1px solid var(--border-muted);border-radius:12px;padding:18px;}
  .stat-card .stat-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
  .stat-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;}
  .stat-num{font-size:24px;font-weight:800;color:var(--navy-dark);margin-bottom:2px;}
  .stat-label{font-size:11.5px;color:var(--text-faint);}
  .stat-trend{font-size:11px;font-weight:700;margin-top:8px;}
  .trend-up{color:var(--success);}
  .trend-flat{color:var(--text-faint);}

  .dash-section-title{font-size:13px;font-weight:700;color:var(--navy-dark);margin-bottom:12px;text-transform:uppercase;letter-spacing:.4px;}
  .quick-actions{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px;}
  .qa-btn{background:#fff;border:1px solid var(--border-muted);border-radius:12px;padding:16px 14px;text-align:left;cursor:pointer;transition:border-color .15s, transform .05s;}
  .qa-btn:hover{border-color:var(--accent-blue);}
  .qa-btn:active{transform:scale(.98);}
  .qa-btn .qa-icon{font-size:18px;margin-bottom:8px;}
  .qa-btn .qa-title{font-size:12.5px;font-weight:700;color:var(--navy-dark);margin-bottom:2px;}
  .qa-btn .qa-sub{font-size:11px;color:var(--text-faint);}
  .qa-btn.locked{opacity:.5;cursor:not-allowed;}

  .activity-list{background:#fff;border:1px solid var(--border-muted);border-radius:12px;overflow:hidden;}
  .activity-item{display:flex;gap:12px;padding:13px 18px;border-bottom:1px solid #f1f5f9;font-size:13px;}
  .activity-item:last-child{border-bottom:none;}
  .activity-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0;}
  .activity-text b{color:var(--navy-dark);}
  .activity-time{margin-left:auto;font-size:11.5px;color:var(--text-faint);white-space:nowrap;}

  .disclaimer{margin-top:24px;font-size:11.5px;color:var(--text-faint);text-align:center;}

  /* ---------- MOBILE ---------- */
  .menu-toggle{display:none;position:fixed;top:14px;left:14px;z-index:30;background:var(--navy-dark);color:#fff;border:none;width:38px;height:38px;border-radius:8px;font-size:16px;cursor:pointer;}
  @media (max-width:920px){
    .sidebar{transform:translateX(-100%);}
    .sidebar.open{transform:translateX(0);}
    .main{margin-left:0;width:100%;}
    .menu-toggle{display:block;}
    .content-area{padding:70px 18px 60px;}
    .stat-grid, .quick-actions{grid-template-columns:repeat(2,1fr);}
    .kv-grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<button class="menu-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>

<aside class="sidebar">
  <div class="brand">
    <div class="brand-mark">
      <div class="brand-logo">MC</div>
      <div>
        <h1>MCCTEST TMIS</h1>
        <span>Administrator Guide</span>
      </div>
    </div>
    <span class="brand-tag">Simulated Environment — No live data</span>
  </div>

  <nav class="nav-scroll">
    <ul class="task-list">
      <li><button type="button" class="task-link dashboard-link" onclick="window.location.href='../../index.html'">↩&nbsp;&nbsp;Return to Landing Page</button></li>
      <li><button class="task-link dashboard-link active" data-module="dashboard" data-task="dashboard" onclick="handleNavClick(this)">🏠&nbsp;&nbsp;Dashboard</button></li>
    </ul>

    <div class="menu-group">
      <div class="menu-group-title">Admission Management</div>
      <ul class="task-list">
        <li><button class="task-link" data-module="admission" data-task="review" onclick="handleNavClick(this)"><span class="dot"></span>Review Applications</button></li>
        <li><button class="task-link" data-module="admission" data-task="approve" onclick="handleNavClick(this)"><span class="dot"></span>Approve Application</button></li>
        <li><button class="task-link" data-module="admission" data-task="reject" onclick="handleNavClick(this)"><span class="dot"></span>Reject Application</button></li>
      </ul>
    </div>

    <div class="menu-group">
      <div class="menu-group-title">Enrollment Management</div>
      <ul class="task-list">
        <li><button class="task-link" data-module="enrollment" data-task="enroll" onclick="handleNavClick(this)"><span class="dot"></span>Enroll Student</button></li>
        <li><button class="task-link" data-module="enrollment" data-task="assign-id" onclick="handleNavClick(this)"><span class="dot"></span>Assign Student ID</button></li>
        <li><button class="task-link" data-module="enrollment" data-task="print-form" onclick="handleNavClick(this)"><span class="dot"></span>Print Enrollment Form</button></li>
      </ul>
    </div>

    <div class="menu-group">
      <div class="menu-group-title">Training Management</div>
      <ul class="task-list">
        <li><button class="task-link" data-module="training" data-task="create-program" onclick="handleNavClick(this)"><span class="dot"></span>Create Training Program</button></li>
        <li><button class="task-link" data-module="training" data-task="assign-trainer" onclick="handleNavClick(this)"><span class="dot"></span>Assign Trainer</button></li>
        <li><button class="task-link" data-module="training" data-task="manage-schedule" onclick="handleNavClick(this)"><span class="dot"></span>Manage Training Schedule</button></li>
      </ul>
    </div>

    <div class="menu-group">
      <div class="menu-group-title">Certificate Management</div>
      <ul class="task-list">
        <li><button class="task-link" data-module="certificate" data-task="generate" onclick="handleNavClick(this)"><span class="dot"></span>Generate Certificate</button></li>
        <li><button class="task-link" data-module="certificate" data-task="reprint" onclick="handleNavClick(this)"><span class="dot"></span>Reprint Certificate</button></li>
      </ul>
    </div>

    <div class="menu-group">
      <div class="menu-group-title">Reports</div>
      <ul class="task-list">
        <li><button class="task-link" data-module="reports" data-task="completers" onclick="handleNavClick(this)"><span class="dot"></span>Generate Completers Report</button></li>
        <li><button class="task-link" data-module="reports" data-task="enrollment" onclick="handleNavClick(this)"><span class="dot"></span>Generate Enrollment Report</button></li>
        <li><button class="task-link" data-module="reports" data-task="employment" onclick="handleNavClick(this)"><span class="dot"></span>Generate Employment Report</button></li>
        <li><button class="task-link" data-module="reports" data-task="terminal" onclick="handleNavClick(this)"><span class="dot"></span>Generate Terminal Report</button></li>
      </ul>
    </div>

    <div class="menu-group">
      <div class="menu-group-title">User Management</div>
      <ul class="task-list">
        <li><button class="task-link" data-module="users" data-task="add" onclick="handleNavClick(this)"><span class="dot"></span>Add User</button></li>
        <li><button class="task-link" data-module="users" data-task="edit" onclick="handleNavClick(this)"><span class="dot"></span>Edit User</button></li>
        <li><button class="task-link" data-module="users" data-task="disable" onclick="handleNavClick(this)"><span class="dot"></span>Disable User</button></li>
        <li><button class="task-link" data-module="users" data-task="reset" onclick="handleNavClick(this)"><span class="dot"></span>Reset Password</button></li>
      </ul>
    </div>
  </nav>

  <div class="sidebar-footer">MCCTEST Capstone Prototype · v0.1</div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="breadcrumb" id="breadcrumb"><b>Dashboard</b></div>
    <div class="role-pill"><div class="avatar">A</div> Admin Session (Simulated)</div>
  </div>
  <div class="content-area" id="task-content"></div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-card" id="modal-card"></div>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
/* =========================================================
   NAVIGATION
   ========================================================= */
function handleNavClick(el){
  document.querySelectorAll('.task-link').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  const mod = el.dataset.module, task = el.dataset.task;
  renderRoute(mod, task);
  document.querySelector('.sidebar').classList.remove('open');
  document.querySelector('.content-area').scrollTop = 0;
  window.scrollTo(0,0);
}

function navigateTo(mod, task){

function openModal(html){
  document.getElementById('modal-card').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal(){
  document.getElementById('modal-overlay').classList.remove('show');
}
function showToast(msg, type){
  type = type || 'success';
  const icons = {success:'✓', danger:'✕', warning:'!', info:'i'};
  const c = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.innerHTML = `<span class="t-icon">${icons[type]||'✓'}</span><span>${msg}</span>`;
  c.appendChild(el);
  setTimeout(()=>{
    el.classList.add('fade-out');
    setTimeout(()=>el.remove(), 250);
  }, 3200);
}

function raRenderTable(){
  const body = document.getElementById('ra-table-body');
  if(!body) return;
  const search = (document.getElementById('ra-search')?.value || '').toLowerCase();
  const filter = document.getElementById('ra-filter')?.value || 'all';
  const rows = raApplicants.filter(a=>{
    const matchesSearch = a.name.toLowerCase().includes(search);
    const matchesFilter = filter==='all' || a.status===filter;
    return matchesSearch && matchesFilter;
  });
  if(rows.length===0){
    body.innerHTML = `<tr><td colspan="4" style="text-align:center;color:var(--text-faint);padding:22px;">No applicants match your search.</td></tr>`;
    return;
  }
  body.innerHTML = rows.map(a=>`
    <tr>
      <td><div class="cell-name">${a.name}</div><div class="cell-sub">Submitted ${a.submitted}</div></td>
      <td>${a.program}</td>
      <td>${raChipHTML(a.status)}</td>
      <td style="text-align:right;"><button class="btn btn-outline btn-sm" onclick="raOpenModal(${a.id})">View</button></td>
    </tr>
  `).join('');
}

function jaConfirmStep(){

  const notes = document.getElementById('ja-notes').value;
  openModal(`

      <h3>Are you sure?</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>

      </p>
    </div>

      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="jaReject('${reason}')">Yes, Reject</button>
    </div>
  `);
}

function jaReject(reason){
  closeModal();
  const chip = document.getElementById('ja-status');
  const btn = document.getElementById('ja-reject-btn');
  if(chip){ chip.className='chip chip-rejected'; chip.textContent='Rejected'; }
  if(btn){ btn.disabled = true; btn.textContent = 'Rejected'; }
  showToast('Application rejected. Applicant will be notified.', 'danger');
}
